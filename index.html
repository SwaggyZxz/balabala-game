<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>巴拉巴拉 - 小小搭配师</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }
        
        .header {
            text-align: center;
            padding: 10px;
            color: white;
            z-index: 10;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .score-board {
            display: flex;
            gap: 20px;
            font-size: 16px;
            font-weight: bold;
        }
        
        .game-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 60vh;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            overflow: hidden;
            margin: 10px;
        }
        
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        .start-screen, .game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 20;
        }
        
        .start-screen h2, .game-over-screen h2 {
            font-size: 28px;
            margin-bottom: 20px;
            color: #FFD700;
        }
        
        .start-screen p, .game-over-screen p {
            font-size: 16px;
            margin-bottom: 10px;
            text-align: center;
            padding: 0 20px;
            line-height: 1.6;
        }
        
        .btn {
            background: linear-gradient(45deg, #FF6B6B, #FF8E53);
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            color: white;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(255,107,107,0.4);
            transition: transform 0.2s;
        }
        
        .btn:active {
            transform: scale(0.95);
        }
        
        .hidden {
            display: none !important;
        }
        
        .brand-footer {
            text-align: center;
            color: rgba(255,255,255,0.8);
            padding: 10px;
            font-size: 14px;
        }
        
        .brand-footer strong {
            color: #FFD700;
        }
        
        .tutorial {
            margin: 15px 0;
            text-align: center;
        }
        
        .tutorial-item {
            display: inline-block;
            margin: 5px 10px;
            font-size: 30px;
        }
        
        .final-score {
            font-size: 48px;
            color: #FFD700;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🛍️ 巴拉巴拉 - 小小搭配师</h1>
        <div class="score-board">
            <span>得分: <span id="score">0</span></span>
            <span>时间: <span id="time">30</span>s</span>
        </div>
    </div>
    
    <div class="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div class="start-screen" id="startScreen">
            <h2>👋 欢迎来到巴拉巴拉!</h2>
            <div class="tutorial">
                <div class="tutorial-item">👕</div>
                <div class="tutorial-item">👗</div>
                <div class="tutorial-item">👟</div>
            </div>
            <p>左右移动购物车接住掉落的衣服!<br>
            👕 衣服 +10分 | 👗 裙子 +20分<br>
            ⚡ 炸弹 -30分 (小心!)</p>
            <button class="btn" onclick="startGame()">开始游戏</button>
        </div>
        
        <div class="game-over-screen hidden" id="gameOverScreen">
            <h2>🎉 游戏结束!</h2>
            <div class="final-score" id="finalScore">0</div>
            <p id="rankText">搭配小达人</p>
            <p>分享给你的好友一起来挑战吧!</p>
            <button class="btn" onclick="restartGame()">再玩一次</button>
        </div>
    </div>
    
    <div class="brand-footer">
        <strong>巴拉巴拉童装</strong> | 南通通州 6 家门店<br>
        春夏新款上市，欢迎到店选购!
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // 设置 canvas 尺寸
        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        // 游戏状态
        let gameState = 'start'; // start, playing, gameover
        let score = 0;
        let timeLeft = 30;
        let gameLoop = null;
        let timerInterval = null;
        
        // 购物车
        const cart = {
            x: 0,
            y: 0,
            width: 80,
            height: 60,
            speed: 0,
            targetX: 0
        };
        
        // 物品
        const items = [];
        const itemTypes = [
            { emoji: '👕', score: 10, speed: 2 },
            { emoji: '👗', score: 20, speed: 2.5 },
            { emoji: '👟', score: 15, speed: 3 },
            { emoji: '🧢', score: 10, speed: 2 },
            { emoji: '💣', score: -30, speed: 3.5, isBomb: true }
        ];
        
        // 粒子效果
        const particles = [];
        
        function initCart() {
            cart.width = canvas.width * 0.25;
            cart.height = cart.width * 0.75;
            cart.x = (canvas.width - cart.width) / 2;
            cart.y = canvas.height - cart.height - 10;
            cart.targetX = cart.x;
        }
        
        function spawnItem() {
            const type = itemTypes[Math.floor(Math.random() * itemTypes.length)];
            const size = canvas.width * 0.12;
            items.push({
                x: Math.random() * (canvas.width - size),
                y: -size,
                size: size,
                type: type,
                rotation: 0
            });
        }
        
        function createParticles(x, y, color) {
            for (let i = 0; i < 8; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    life: 1,
                    color: color
                });
            }
        }
        
        function update() {
            if (gameState !== 'playing') return;
            
            // 更新购物车位置（平滑移动）
            cart.x += (cart.targetX - cart.x) * 0.2;
            
            // 限制购物车不出界
            cart.x = Math.max(0, Math.min(canvas.width - cart.width, cart.x));
            
            // 随机生成物品
            if (Math.random() < 0.03) {
                spawnItem();
            }
            
            // 更新物品
            for (let i = items.length - 1; i >= 0; i--) {
                const item = items[i];
                item.y += item.type.speed * (canvas.height / 600);
                item.rotation += 0.05;
                
                // 碰撞检测
                if (item.y + item.size > cart.y && 
                    item.y < cart.y + cart.height &&
                    item.x + item.size > cart.x && 
                    item.x < cart.x + cart.width) {
                    
                    // 接到物品
                    score += item.type.score;
                    document.getElementById('score').textContent = score;
                    
                    // 粒子效果
                    const color = item.type.isBomb ? '#FF4444' : '#FFD700';
                    createParticles(item.x + item.size/2, item.y + item.size/2, color);
                    
                    items.splice(i, 1);
                    continue;
                }
                
                // 移除超出屏幕的物品
                if (item.y > canvas.height) {
                    items.splice(i, 1);
                }
            }
            
            // 更新粒子
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.3;
                p.life -= 0.02;
                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }
        }
        
        function draw() {
            // 清空画布
            ctx.fillStyle = 'rgba(255,255,255,0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制购物车
            ctx.font = `${cart.width * 0.8}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('🛒', cart.x + cart.width/2, cart.y + cart.height/2);
            
            // 绘制物品
            for (const item of items) {
                ctx.save();
                ctx.translate(item.x + item.size/2, item.y + item.size/2);
                ctx.rotate(item.rotation);
                ctx.font = `${item.size}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(item.type.emoji, 0, 0);
                ctx.restore();
            }
            
            // 绘制粒子
            for (const p of particles) {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
        }
        
        function gameStep() {
            update();
            draw();
            gameLoop = requestAnimationFrame(gameStep);
        }
        
        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('time').textContent = timeLeft;
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }
        
        function startGame() {
            document.getElementById('startScreen').classList.add('hidden');
            gameState = 'playing';
            score = 0;
            timeLeft = 30;
            items.length = 0;
            particles.length = 0;
            document.getElementById('score').textContent = '0';
            document.getElementById('time').textContent = '30';
            
            initCart();
            startTimer();
            gameStep();
        }
        
        function endGame() {
            gameState = 'gameover';
            clearInterval(timerInterval);
            cancelAnimationFrame(gameLoop);
            
            document.getElementById('finalScore').textContent = score;
            
            // 评价
            let rankText = '';
            if (score >= 500) rankText = '🏆 搭配大师! 你是天生的时尚达人!';
            else if (score >= 300) rankText = '⭐ 搭配高手! 眼光真不错!';
            else if (score >= 150) rankText = '👍 搭配小能手! 继续加油!';
            else rankText = '💪 新手搭配师! 多练习就能变强!';
            
            document.getElementById('rankText').textContent = rankText;
            document.getElementById('gameOverScreen').classList.remove('hidden');
        }
        
        function restartGame() {
            document.getElementById('gameOverScreen').classList.add('hidden');
            startGame();
        }
        
        // 触摸控制
        let touchStartX = 0;
        
        canvas.addEventListener('touchstart', (e) => {
            if (gameState !== 'playing') return;
            touchStartX = e.touches[0].clientX;
        }, { passive: true });
        
        canvas.addEventListener('touchmove', (e) => {
            if (gameState !== 'playing') return;
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            cart.targetX = touch.clientX - rect.left - cart.width / 2;
        }, { passive: false });
        
        // 鼠标控制
        canvas.addEventListener('mousemove', (e) => {
            if (gameState !== 'playing') return;
            const rect = canvas.getBoundingClientRect();
            cart.targetX = e.clientX - rect.left - cart.width / 2;
        });
        
        // 初始化
        initCart();
    </script>
</body>
</html>
